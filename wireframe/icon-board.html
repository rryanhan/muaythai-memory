<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Method Badge Board</title>
    <link rel="stylesheet" href="./icon-board.css" />
  </head>
  <body>
    <main>
      <header>
        <p>Training Method Badge Set</p>
        <h1>First-pass SVG badges</h1>
      </header>

      <section class="board">
        <article>
          <img src="../assets/context-badges/pad-work.svg?v=solid-hex-bg-20260616" alt="Pad Work badge" />
          <h2>Pad Work</h2>
        </article>
        <article>
          <img src="../assets/context-badges/bag-work.svg?v=solid-hex-bg-20260616" alt="Bag Work badge" />
          <h2>Bag Work</h2>
        </article>
        <article>
          <img src="../assets/context-badges/partner-drill.svg?v=solid-hex-bg-20260616" alt="Partner Drill badge" />
          <h2>Partner Drill</h2>
        </article>
        <article>
          <img src="../assets/context-badges/clinch.svg?v=solid-hex-bg-20260616" alt="Clinch badge" />
          <h2>Clinch</h2>
        </article>
      </section>

      <section class="section-heading">
        <p>Simple symbol pass</p>
        <h2>Phosphor-style training method icons</h2>
      </section>

      <section class="board">
        <article>
          <img src="../assets/context-badges/pad-work-simple.svg?v=solid-hex-bg-20260616" alt="Simple Pad Work badge" />
          <h2>Pad Work</h2>
        </article>
        <article>
          <img src="../assets/context-badges/bag-work-simple.svg?v=solid-hex-bg-20260616" alt="Simple Bag Work badge" />
          <h2>Bag Work</h2>
        </article>
        <article>
          <img src="../assets/context-badges/partner-drill-simple.svg?v=solid-hex-bg-20260616" alt="Simple Partner Drill badge" />
          <h2>Partner Drill</h2>
        </article>
        <article>
          <img src="../assets/context-badges/clinch-simple.svg?v=solid-hex-bg-20260616" alt="Simple Clinch badge" />
          <h2>Clinch</h2>
        </article>
        <article>
          <img src="../assets/context-badges/technical-work-simple.svg?v=solid-hex-bg-20260616" alt="Simple Technical Work badge" />
          <h2>Technical Work</h2>
        </article>
      </section>

      <section class="scale-check">
        <h2>Small-size check</h2>
        <div>
          <img src="../assets/context-badges/pad-work-simple.svg?v=solid-hex-bg-20260616" alt="" />
          <img src="../assets/context-badges/bag-work-simple.svg?v=solid-hex-bg-20260616" alt="" />
          <img src="../assets/context-badges/partner-drill-simple.svg?v=solid-hex-bg-20260616" alt="" />
          <img src="../assets/context-badges/clinch-simple.svg?v=solid-hex-bg-20260616" alt="" />
          <img src="../assets/context-badges/technical-work-simple.svg?v=solid-hex-bg-20260616" alt="" />
        </div>
      </section>
    </main>
  </body>
</html>
