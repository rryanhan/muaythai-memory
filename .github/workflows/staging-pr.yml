name: Promotion CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main

permissions:
  contents: read

concurrency:
  group: promotion-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests, lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_POOLER_URL: postgresql://postgres:postgres@127.0.0.1:5432/muaythai_ci
      DATABASE_POOL_MAX: "3"
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate isolated auth-flow key
        run: echo "AUTH_FLOW_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Verify access-control configuration
        run: npm run db:verify-access-control:test

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run production build
        run: npm run build

  ephemeral-database:
    name: Ephemeral Postgres migration checks
    if: >-
      github.event_name == 'pull_request'
      || github.ref == 'refs/heads/staging'
      || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTH_FLOW_SECRET: ci-only-auth-flow-secret-with-at-least-32-bytes
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/muaythai_ci
      DATABASE_POOLER_URL: postgresql://postgres:postgres@127.0.0.1:5432/muaythai_ci
      DATABASE_POOL_MAX: "3"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: muaythai_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d muaythai_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migrate ephemeral database
        run: npm run db:migrate

      - name: Verify recovery grant concurrency and retention
        run: npm run auth:verify-recovery-grants
