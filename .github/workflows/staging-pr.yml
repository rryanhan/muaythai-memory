name: Staging PR

on:
  pull_request:
    branches:
      - staging

permissions:
  contents: read

concurrency:
  group: staging-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify access-control configuration
        run: npm run db:verify-access-control:test

      - name: Run typecheck
        run: npm run typecheck
